<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>合盘卡片 Mockup</title>
    <style>
      :root {
        --ink: #17130f;
        --muted: #8a8174;
        --line: #e9e2d5;
        --paper: #fffefa;
        --paper-2: #f8f4ea;
        --a: #2d6a4f;
        --b: #2b6cb0;
        --pair: #2c6b80;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f3ee;
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Noto Sans SC", sans-serif;
      }

      .stage {
        width: min(92vw, 960px);
        padding: 34px 24px;
        display: grid;
        grid-template-columns: minmax(0, 430px) minmax(0, 1fr);
        gap: 34px;
        align-items: center;
      }

      .hepan-card {
        width: min(430px, 100%);
        aspect-ratio: 3 / 4;
        margin: 0 auto;
        padding: 25px 27px 19px;
        border: 1px solid #eee8dd;
        background:
          linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.84)),
          radial-gradient(90% 46% at 50% 18%, color-mix(in srgb, var(--pair) 8%, transparent), transparent 72%),
          var(--paper);
        box-shadow: 0 24px 70px rgba(38, 31, 23, .13), 0 1px 0 rgba(255,255,255,.96) inset;
        display: flex;
        flex-direction: column;
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      .hepan-card::after {
        content: "";
        position: absolute;
        inset: 12px;
        border: 1px solid rgba(23, 19, 15, .055);
        pointer-events: none;
      }

      .head,
      .foot {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        color: var(--muted);
        font-size: 10px;
        letter-spacing: .22em;
        position: relative;
        z-index: 1;
      }

      .ids {
        display: inline-flex;
        gap: 5px;
        align-items: baseline;
        font-family: Georgia, "Times New Roman", serif;
        letter-spacing: .04em;
      }

      .id-a { color: var(--a); font-size: 14px; }
      .id-b { color: var(--b); font-size: 14px; }
      .x { color: #b7aa98; margin: 0 2px; }
      .ids em { color: #b7aa98; font-style: normal; font-size: 10px; }

      .art-window {
        margin: 13px auto 5px;
        width: 78%;
        aspect-ratio: 1.2 / 1;
        display: grid;
        place-items: center;
        position: relative;
        z-index: 1;
      }

      .art-window::before {
        content: "";
        position: absolute;
        left: 12%;
        right: 12%;
        bottom: 15%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(44,107,128,.24), transparent);
      }

      .art-window img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      .state {
        margin-top: 2px;
        color: var(--pair);
        font-size: 10px;
        letter-spacing: .18em;
      }

      h1 {
        margin: 7px 0 0;
        font-size: 43px;
        line-height: 1.02;
        font-weight: 600;
        letter-spacing: .02em;
      }

      .names {
        margin: 7px 0 0;
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 6px;
        font-size: 12px;
        line-height: 1.35;
      }

      .name-a { color: var(--a); }
      .name-b { color: var(--b); }

      .subtags {
        list-style: none;
        margin: 14px 0 0;
        padding: 0;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
      }

      .subtags li {
        min-height: 39px;
        padding: 7px 5px;
        border-top: 1px solid color-mix(in srgb, var(--pair) 30%, var(--line));
        border-bottom: 1px solid #f1eadf;
        background: rgba(255,255,255,.45);
        font-size: 10.5px;
        line-height: 1.22;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .roles {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 1fr 1px 1fr;
        gap: 12px;
        align-items: center;
      }

      .divider {
        width: 1px;
        height: 46px;
        background: linear-gradient(180deg, transparent, rgba(23,19,15,.18), transparent);
      }

      .role-title {
        display: block;
        font-size: 12px;
        letter-spacing: .06em;
        margin-bottom: 4px;
      }

      .role-a .role-title { color: var(--a); }
      .role-b .role-title { color: var(--b); }

      .role-copy {
        display: block;
        font-family: "Songti SC", "STSong", "Noto Serif SC", "SimSun", Georgia, serif;
        font-size: 13px;
        line-height: 1.36;
      }

      .copy {
        flex: 1;
        display: grid;
        align-content: center;
        gap: 7px;
        margin-top: 10px;
      }

      .desc {
        margin: 0;
        font-family: "Songti SC", "STSong", "Noto Serif SC", "SimSun", Georgia, serif;
        font-size: 12.4px;
        line-height: 1.52;
      }

      blockquote {
        margin: 0;
        font-family: "Songti SC", "STSong", "Noto Serif SC", "SimSun", Georgia, serif;
        font-size: 14px;
        line-height: 1.38;
      }

      blockquote span {
        color: var(--pair);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 24px;
        vertical-align: -7px;
      }

      .foot {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid rgba(23,19,15,.07);
      }

      .notes h2 {
        margin: 0 0 14px;
        font-size: 25px;
        font-weight: 600;
        letter-spacing: 0;
      }

      .notes p {
        margin: 0 0 12px;
        color: #4d463f;
        font-size: 14px;
        line-height: 1.75;
      }

      .thumbs {
        margin-top: 18px;
        display: flex;
        gap: 14px;
      }

      .thumb {
        width: 86px;
        aspect-ratio: 1;
        border: 1px solid var(--line);
        background: #fff;
        display: grid;
        place-items: center;
      }

      .thumb img {
        width: 78%;
        height: 78%;
        object-fit: contain;
      }

      @media (max-width: 780px) {
        .stage {
          grid-template-columns: 1fr;
        }

        .notes {
          order: -1;
        }
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <article class="hepan-card">
        <header class="head">
          <span>有时合盘</span>
          <span class="ids">
            <span class="id-a">01</span>
            <span class="x">×</span>
            <span class="id-b">08</span>
            <em>/ 20</em>
          </span>
        </header>

        <figure class="art-window">
          <img src="./chunsun-x-xiaoyedeng.png" alt="春笋与小夜灯融合插画" />
        </figure>

        <div class="state">绽放 × 蓄力</div>
        <h1>撑腰搭子</h1>
        <div class="names">
          <span class="name-a">@春笋</span>
          <span class="x">×</span>
          <span class="name-b">@小夜灯</span>
        </div>

        <ul class="subtags">
          <li>一个往前长</li>
          <li>一个替你亮</li>
          <li>靠近后更稳</li>
        </ul>

        <section class="roles">
          <div class="role-a">
            <span class="role-title">春笋</span>
            <span class="role-copy">把关系往上托</span>
          </div>
          <div class="divider"></div>
          <div class="role-b">
            <span class="role-title">小夜灯</span>
            <span class="role-copy">给夜里留一盏光</span>
          </div>
        </section>

        <div class="copy">
          <p class="desc">你们不是轰轰烈烈地相似，而是一个负责向上，一个负责照亮脚边。</p>
          <blockquote><span>"</span>你冲，我在后面把灯留着。</blockquote>
        </div>

        <footer class="foot">
          <span>PAIR EDITION</span>
          <span>youshi.app</span>
        </footer>
      </article>

      <section class="notes">
        <h2>方向：两张单人卡合成一张关系卡</h2>
        <p>这版把「春笋」和「小夜灯」都作为可识别主体保留下来，中间只用很轻的线和光做融合，不再做独立的关系类别图。</p>
        <p>如果方向对，正式版会把 A/B 的编号、名字、主题色、角色文案动态塞进同一套封套结构，再为 6 类关系重生图。</p>
        <div class="thumbs">
          <div class="thumb"><img src="../../server/app/data/cards/illustrations/01-chunsun.png" alt="春笋" /></div>
          <div class="thumb"><img src="../../server/app/data/cards/illustrations/08-xiaoyedeng.png" alt="小夜灯" /></div>
        </div>
      </section>
    </main>
  </body>
</html>
